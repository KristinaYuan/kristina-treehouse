<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- A minimal treehouse silhouette — simple window in the sky -->
  <rect width="100" height="100" rx="12" fill="#FAFCFF"/>
  <!-- Window frame -->
  <rect x="20" y="25" width="60" height="50" rx="4" fill="none" stroke="#7AAEDB" stroke-width="3"/>
  <!-- Window cross -->
  <line x1="50" y1="25" x2="50" y2="75" stroke="#7AAEDB" stroke-width="2"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke="#7AAEDB" stroke-width="2"/>
  <!-- Small cloud -->
  <ellipse cx="65" cy="22" rx="8" ry="4" fill="#E8EEF6"/>
  <!-- Subtle tree branch hint -->
  <line x1="10" y1="90" x2="90" y2="78" stroke="#7AAEDB" stroke-width="1.5" opacity="0.5"/>
</svg>
